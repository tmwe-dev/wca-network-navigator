<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: -apple-system, sans-serif; width: 260px; padding: 16px; margin: 0; background: #0f172a; color: #e2e8f0; }
    h3 { margin: 0 0 8px; font-size: 14px; color: #38bdf8; }
    p { margin: 0; font-size: 12px; line-height: 1.5; color: #94a3b8; }
    .status { display: flex; align-items: center; gap: 6px; margin-top: 12px; font-size: 11px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
  </style>
</head>
<body>
  <h3>🔥 FireScrape</h3>
  <p>Motore di ricerca e scraping client-side per Deep Search. Nessun costo API.</p>
  <div class="status">
    <span class="dot"></span>
    <span>Attivo — ricerche dal tuo browser</span>
  </div>
</body>
</html>
