<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 300px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; background: #1a1a2e; color: #e0e0e0; }
    h2 { margin: 0 0 12px; font-size: 15px; color: #fff; }
    .status { padding: 8px 12px; border-radius: 8px; margin-bottom: 10px; font-size: 12px; }
    .ok { background: #064e3b; color: #6ee7b7; }
    .error { background: #7f1d1d; color: #fca5a5; }
    .info { background: #1e3a5f; color: #93c5fd; }
    button { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: #374151; color: #d1d5db; }
    .btn-secondary:hover { background: #4b5563; }
    #log { font-size: 11px; color: #9ca3af; margin-top: 8px; white-space: pre-wrap; max-height: 120px; overflow-y: auto; }
  </style>
</head>
<body>
  <h2>🏢 ReportAziende Sync</h2>
  <div id="statusBox" class="status info">Pronto</div>
  <button id="btnLogin" class="btn-primary">🚀 Connetti ReportAziende</button>
  <button id="btnSync" class="btn-secondary">🔄 Sincronizza Cookie</button>
  <div id="log"></div>

  <script src="popup.js"></script>
</body>
</html>
