<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      width: 280px; padding: 24px; margin: 0;
      background: #0b0d14; color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      text-align: center;
    }
    .logo { font-size: 40px; margin-bottom: 12px; }
    h2 {
      font-size: 16px; font-weight: 700; margin-bottom: 6px;
      background: linear-gradient(135deg, #f1f5f9, #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    p { font-size: 12px; color: #94a3b8; margin-bottom: 20px; line-height: 1.5; }
    .btn {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: white; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 2px 12px rgba(99,102,241,0.3);
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(99,102,241,0.4); }
    .hint { font-size: 10px; color: #64748b; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="logo">🌐</div>
  <h2>Communication Hub</h2>
  <p>Apri il pannello laterale per gestire Email, WhatsApp e LinkedIn.</p>
  <button class="btn" id="btn-open">📬 Apri pannello laterale</button>
  <div class="hint">Il pannello si apre sulla destra del browser</div>
  <script src="popup.js"></script>
</body>
</html>
