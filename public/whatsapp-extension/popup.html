<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 280px; padding: 16px; font-family: -apple-system, system-ui, sans-serif; background: #111; color: #eee; }
    h2 { font-size: 14px; margin: 0 0 8px; display: flex; align-items: center; gap: 6px; }
    .status { font-size: 12px; color: #aaa; margin-bottom: 12px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot.green { background: #25D366; }
    .dot.red { background: #e74c3c; }
    .logo { font-size: 20px; }
    button { width: 100%; padding: 8px; border: none; border-radius: 6px; background: #25D366; color: white; font-weight: 600; cursor: pointer; font-size: 12px; }
    button:hover { background: #1da851; }
  </style>
</head>
<body>
  <h2><span class="logo">📱</span> WhatsApp Direct Send</h2>
  <p class="status">
    Stato: <span class="dot" id="dot"></span> <span id="statusText">Verifico...</span>
  </p>
  <button id="checkBtn">Verifica connessione</button>
  <script src="popup.js"></script>
</body>
</html>
