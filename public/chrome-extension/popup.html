<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      text-align: center;
    }
    h2 {
      font-size: 15px;
      margin: 0 0 16px;
      color: #94a3b8;
      font-weight: 500;
    }
    .status {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 14px;
      line-height: 1.4;
    }
    .status.ok { background: #065f46; color: #6ee7b7; }
    .status.error { background: #7f1d1d; color: #fca5a5; }
    .status.working { background: #1e3a5f; color: #93c5fd; }
    .status.idle { background: #1e293b; color: #94a3b8; }
    #mainBtn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.3px;
    }
    #mainBtn:hover { background: #2563eb; }
    #mainBtn:disabled { background: #475569; cursor: not-allowed; }
    .step-log {
      font-size: 11px;
      color: #64748b;
      margin-top: 12px;
      text-align: left;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.6;
    }
    .step-log .done { color: #6ee7b7; }
    .step-log .fail { color: #fca5a5; }
    .step-log .wait { color: #93c5fd; }
  </style>
</head>
<body>
  <h2>🌐 WCA Cookie Sync</h2>
  <div id="status" class="status idle">Pronto. Un click e fa tutto lui.</div>
  <button id="mainBtn">🚀 Connetti WCA</button>
  <div id="log" class="step-log"></div>
  <script src="popup.js"></script>
</body>
</html>
