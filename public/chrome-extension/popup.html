<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    }
    h2 {
      font-size: 16px;
      margin: 0 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status {
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .status.ok { background: #065f46; color: #6ee7b7; }
    .status.error { background: #7f1d1d; color: #fca5a5; }
    .status.idle { background: #1e293b; color: #94a3b8; }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2563eb; }
    button:disabled { background: #475569; cursor: not-allowed; }
    .hint {
      font-size: 11px;
      color: #64748b;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>🌐 WCA Cookie Sync</h2>
  <div id="status" class="status idle">Pronto per sincronizzare</div>
  <button id="syncBtn">🔄 Sincronizza Cookie</button>
  <p class="hint">Assicurati di essere loggato su wcaworld.com</p>
  <script src="popup.js"></script>
</body>
</html>
